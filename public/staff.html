<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rústico · Mostrador</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;600;700&family=Rubik:wght@600&display=swap" rel="stylesheet">
<style>
  :root{ --cream:#f0e9d7; --paper:#f7f3e6; --brown:#673921; --charcoal:#434329; --taupe:#a39c73; --olive:#7b763d; --olive-dark:#5e5c30; }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--cream); font-family:'Karla',sans-serif; color:var(--charcoal); display:flex; justify-content:center; padding:30px 16px; }
  .card{ width:100%; max-width:400px; background:var(--paper); border-radius:22px; padding:26px 22px; box-shadow:0 18px 40px -18px rgba(67,67,41,.35); }
  h1{ font-family:'Rubik',sans-serif; font-size:19px; color:var(--brown); text-align:center; margin:0 0 16px; }
  .badge{ display:block; width:fit-content; margin:0 auto 14px; background:var(--brown); color:var(--paper); font-size:11px; text-transform:uppercase; letter-spacing:.5px; padding:4px 10px; border-radius:20px; }

  .pin-dots{ display:flex; justify-content:center; gap:12px; margin:10px 0 20px; }
  .pin-dots .dot{ width:14px; height:14px; border-radius:50%; border:2px solid var(--taupe); }
  .pin-dots .dot.filled{ background:var(--olive); border-color:var(--olive); }
  .pin-pad{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .pin-key{ aspect-ratio:1; border-radius:14px; border:none; background:rgba(163,156,115,.14); font-size:19px; cursor:pointer; }
  .pin-key.wide{ font-size:13px; color:var(--taupe); }
  .error{ color:#8a3b2b; font-size:13px; text-align:center; min-height:16px; }

  #scanScreen{ display:none; }
  .scan-frame{ position:relative; width:100%; aspect-ratio:1; border-radius:16px; overflow:hidden; background:#111; margin-bottom:14px; }
  .scan-frame video{ width:100%; height:100%; object-fit:cover; }
  .hint{ text-align:center; font-size:13px; color:var(--taupe); margin-bottom:14px; }
  .result{ display:none; text-align:center; border-radius:16px; padding:18px; margin-bottom:14px; }
  .result.ok{ background:linear-gradient(135deg,var(--olive),var(--olive-dark)); color:var(--paper); }
  .result.warn{ background:rgba(163,156,115,.2); }
  .result.err{ background:#8a3b2b; color:var(--paper); }
  .result .name{ font-family:'Rubik',sans-serif; font-weight:600; font-size:18px; margin-bottom:4px; }
  .btn-ghost{ display:block; width:100%; background:transparent; border:none; color:var(--taupe); text-decoration:underline; font-size:12px; padding:8px; cursor:pointer; }
</style>
</head>
<body>
  <div class="card">
    <span class="badge">Modo mostrador</span>

    <div id="pinScreen">
      <h1>Ingresá el PIN</h1>
      <div class="pin-dots" id="pinDots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      <div class="error" id="pinError"></div>
      <div class="pin-pad" id="pinPad">
        <button class="pin-key" data-k="1">1</button><button class="pin-key" data-k="2">2</button><button class="pin-key" data-k="3">3</button>
        <button class="pin-key" data-k="4">4</button><button class="pin-key" data-k="5">5</button><button class="pin-key" data-k="6">6</button>
        <button class="pin-key" data-k="7">7</button><button class="pin-key" data-k="8">8</button><button class="pin-key" data-k="9">9</button>
        <button class="pin-key wide" data-k="back">Borrar</button><button class="pin-key" data-k="0">0</button><button class="pin-key wide" data-k="cancel">Salir</button>
      </div>
    </div>

    <div id="scanScreen">
      <h1>Escanear cliente</h1>
      <div class="scan-frame"><video id="video" playsinline muted autoplay></video></div>
      <p class="hint" id="hint">Apuntá la cámara al código QR del cliente</p>
      <div class="result" id="result">
        <div class="name" id="resultName"></div>
        <div id="resultDetail1"></div>
        <div id="resultDetail2"></div>
      </div>
      <button class="btn-ghost" id="btnExit">Salir del modo mostrador</button>
    </div>
  </div>

<script>
  const el = {
    pinScreen: document.getElementById('pinScreen'),
    scanScreen: document.getElementById('scanScreen'),
    pinDots: document.getElementById('pinDots'),
    pinPad: document.getElementById('pinPad'),
    pinError: document.getElementById('pinError'),
    video: document.getElementById('video'),
    hint: document.getElementById('hint'),
    result: document.getElementById('result'),
    resultName: document.getElementById('resultName'),
    resultDetail1: document.getElementById('resultDetail1'),
    resultDetail2: document.getElementById('resultDetail2'),
    btnExit: document.getElementById('btnExit')
  };

  let pinBuffer = '';
  let currentPin = '';
  let stream = null;
  let loopId = null;
  let locked = false;
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });

  function renderDots(){
    el.pinDots.querySelectorAll('.dot').forEach((d,i)=> d.classList.toggle('filled', i < pinBuffer.length));
  }

  async function tryPin(){
    el.pinError.textContent = '';
    try{
      const r = await fetch('/api/staff/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ pin: pinBuffer })
      });
      if(r.ok){
        currentPin = pinBuffer;
        pinBuffer = ''; renderDots();
        el.pinScreen.style.display = 'none';
        el.scanScreen.style.display = 'block';
        startScanner();
      } else {
        el.pinError.textContent = 'PIN incorrecto';
        setTimeout(()=>{ pinBuffer=''; renderDots(); }, 500);
      }
    }catch(err){
      el.pinError.textContent = 'No se pudo conectar con el servidor.';
      pinBuffer=''; renderDots();
    }
  }

  el.pinPad.addEventListener('click', (e)=>{
    const btn = e.target.closest('.pin-key');
    if(!btn) return;
    const k = btn.dataset.k;
    el.pinError.textContent = '';
    if(k === 'back'){ pinBuffer = pinBuffer.slice(0,-1); renderDots(); return; }
    if(k === 'cancel'){ pinBuffer=''; renderDots(); return; }
    if(pinBuffer.length >= 4) return;
    pinBuffer += k; renderDots();
    if(pinBuffer.length === 4) tryPin();
  });

  async function startScanner(){
    try{
      stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' } });
      el.video.srcObject = stream;
      await el.video.play();
      loopId = requestAnimationFrame(scanFrame);
    }catch(err){
      el.hint.textContent = 'No se pudo acceder a la cámara. Revisá los permisos.';
    }
  }

  function scanFrame(){
    if(el.video.readyState === el.video.HAVE_ENOUGH_DATA && !locked){
      canvas.width = el.video.videoWidth; canvas.height = el.video.videoHeight;
      ctx.drawImage(el.video, 0, 0, canvas.width, canvas.height);
      const img = ctx.getImageData(0,0,canvas.width,canvas.height);
      const code = jsQR(img.data, img.width, img.height);
      if(code && code.data) handleScan(code.data);
    }
    loopId = requestAnimationFrame(scanFrame);
  }

  async function handleScan(qrValue){
    if(locked) return;
    locked = true;
    el.hint.textContent = 'Procesando...';

    try{
      const r = await fetch('/api/staff/scan', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ pin: currentPin, qrValue })
      });
      const data = await r.json();

      if(!r.ok){
        showResult('err', 'Error', data.error || 'No se pudo procesar', '');
      } else if(data.result === 'redeemed'){
        showResult('ok', data.name, 'Café gratis canjeado ☕✨', 'Tarjeta reiniciada en 0 / ' + data.totalCups);
      } else if(data.result === 'already_today'){
        showResult('warn', data.name, 'Ya sumó su café de hoy', data.stamps + ' / ' + data.totalCups + ' sellos');
      } else if(data.result === 'completed'){
        showResult('ok', data.name, '¡Sello sumado! Tarjeta completa 🎉', data.stamps + ' / ' + data.totalCups);
      } else {
        showResult('ok', data.name, 'Sello sumado ✓', data.stamps + ' / ' + data.totalCups + ' sellos');
      }
    }catch(err){
      showResult('err', 'Error', 'No se pudo conectar con el servidor', '');
    }

    setTimeout(()=>{
      el.result.style.display = 'none';
      el.hint.textContent = 'Apuntá la cámara al código QR del cliente';
      locked = false;
    }, 2600);
  }

  function showResult(kind, name, d1, d2){
    el.result.className = 'result ' + kind;
    el.result.style.display = 'block';
    el.resultName.textContent = name;
    el.resultDetail1.textContent = d1;
    el.resultDetail2.textContent = d2;
  }

  el.btnExit.addEventListener('click', ()=>{
    if(loopId) cancelAnimationFrame(loopId);
    if(stream) stream.getTracks().forEach(t=>t.stop());
    el.scanScreen.style.display = 'none';
    el.pinScreen.style.display = 'block';
  });
</script>
</body>
</html>
